version = 0.1

[default.deploy.parameters]
stack_name = "sam-app"
resolve_s3 = true
s3_prefix = "sam-app"
confirm_changeset = true
capabilities = "CAPABILITY_NAMED_IAM"
disable_rollback = true
parameter_overrides = "GithubRepo=\"dasumner/democratic-stress-dashboard.github.io\" GithubBranch=\"main\" DataFilePath=\"data/metrics.json\" SecretName=\"dsi/secrets\" ScheduleExpression=\"rate(6 hours)\""
image_repositories = []

[default.global.parameters]
region = "us-east-1"
