AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  Democratic Stress Index — Lambda monitoring agent.
  Fetches secrets from Secrets Manager, runs Claude with web search,
  pushes updated metrics.json to GitHub Pages repo.

Parameters:
  GithubRepo:
    Type: String
    Description: "GitHub repo in user/repo format"
  GithubBranch:
    Type: String
    Default: main
  DataFilePath:
    Type: String
    Default: data/metrics.json
  SecretName:
    Type: String
    Default: dsi/secrets
  ScheduleExpression:
    Type: String
    Default: "rate(6 hours)"
    Description: "EventBridge schedule — e.g. rate(6 hours) or cron(0 */6 * * ? *)"

Globals:
  Function:
    Runtime: python3.12
    Timeout: 120
    MemorySize: 256
    Environment:
      Variables:
        GITHUB_REPO:      !Ref GithubRepo
        GITHUB_BRANCH:    !Ref GithubBranch
        DATA_FILE_PATH:   !Ref DataFilePath
        DSI_SECRET_NAME:  !Ref SecretName

Resources:

  # ── Lambda Function ────────────────────────────────────────────────────────
  DSIAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: dsi-monitoring-agent
      CodeUri: ../          # points to agent/ directory
      Handler: lambda_handler.handler
      Description: "DSI monitoring agent — calls Claude, updates GitHub Pages"
      Role: !GetAtt DSIAgentRole.Arn
      Events:
        ScheduledRun:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: !Ref ScheduleExpression
            ScheduleExpressionTimezone: UTC
            Description: "Trigger DSI agent on schedule"

  # ── IAM Role ───────────────────────────────────────────────────────────────
  DSIAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dsi-agent-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Basic Lambda execution: CloudWatch Logs
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DSISecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadDSISecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                # Scoped to the specific secret — not all secrets in account
                Resource: !Sub
                  - "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*"
                  - SecretName: !Ref SecretName

  # ── CloudWatch Log Group (explicit, with retention) ───────────────────────
  DSIAgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/dsi-monitoring-agent"
      RetentionInDays: 30

Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt DSIAgentFunction.Arn
  RoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt DSIAgentRole.Arn
