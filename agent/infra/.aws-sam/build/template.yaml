AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Democratic Stress Index \u2014 Lambda monitoring agent. Fetches secrets\
  \ from Secrets Manager, runs Claude with web search, pushes updated metrics.json\
  \ to GitHub Pages repo.\n"
Parameters:
  GithubRepo:
    Type: String
    Description: GitHub repo in user/repo format
  GithubBranch:
    Type: String
    Default: main
  DataFilePath:
    Type: String
    Default: data/metrics.json
  SecretName:
    Type: String
    Default: dsi/secrets
  ScheduleExpression:
    Type: String
    Default: rate(6 hours)
    Description: "EventBridge schedule \u2014 e.g. rate(6 hours) or cron(0 */6 * *\
      \ ? *)"
Globals:
  Function:
    Runtime: python3.12
    Timeout: 120
    MemorySize: 256
    Environment:
      Variables:
        GITHUB_REPO:
          Ref: GithubRepo
        GITHUB_BRANCH:
          Ref: GithubBranch
        DATA_FILE_PATH:
          Ref: DataFilePath
        DSI_SECRET_NAME:
          Ref: SecretName
Resources:
  DSIAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: dsi-monitoring-agent
      CodeUri: DSIAgentFunction
      Handler: lambda_handler.handler
      Description: "DSI monitoring agent \u2014 calls Claude, updates GitHub Pages"
      Role:
        Fn::GetAtt:
        - DSIAgentRole
        - Arn
      Events:
        ScheduledRun:
          Type: ScheduleV2
          Properties:
            ScheduleExpression:
              Ref: ScheduleExpression
            ScheduleExpressionTimezone: UTC
            Description: Trigger DSI agent on schedule
    Metadata:
      SamResourceId: DSIAgentFunction
  DSIAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dsi-agent-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DSISecretsAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: ReadDSISecret
            Effect: Allow
            Action:
            - secretsmanager:GetSecretValue
            - secretsmanager:DescribeSecret
            Resource:
              Fn::Sub:
              - arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*
              - SecretName:
                  Ref: SecretName
  DSIAgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/dsi-monitoring-agent
      RetentionInDays: 30
Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value:
      Fn::GetAtt:
      - DSIAgentFunction
      - Arn
  RoleArn:
    Description: Lambda execution role ARN
    Value:
      Fn::GetAtt:
      - DSIAgentRole
      - Arn
